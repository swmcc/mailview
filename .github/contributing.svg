<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="pythonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B8BBE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#306998;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="pythonYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE873;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD43B;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0d1117" rx="12"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e2430" stroke-width="1"/>
  </pattern>
  <rect width="800" height="200" fill="url(#grid)" opacity="0.5" rx="12"/>

  <!-- Snake with wrench -->
  <g filter="url(#shadow)" transform="translate(60, 30)">
    <!-- Snake body coiled -->
    <path d="M 50 120
             C 20 120, 10 90, 30 70
             C 50 50, 80 60, 90 80
             C 100 100, 80 120, 60 115
             C 40 110, 50 90, 70 85"
          fill="none"
          stroke="url(#pythonYellow)"
          stroke-width="18"
          stroke-linecap="round"/>

    <!-- Snake head -->
    <ellipse cx="75" cy="82" rx="16" ry="12" fill="#FFD43B"/>

    <!-- Snake eye -->
    <circle cx="82" cy="78" r="4" fill="#306998"/>

    <!-- Snake tongue -->
    <path d="M 91 82 L 102 78 M 91 82 L 102 86"
          stroke="#e74c3c"
          stroke-width="2"
          stroke-linecap="round"/>

    <!-- Wrench -->
    <g transform="translate(85, 45) rotate(35)">
      <!-- Wrench handle -->
      <rect x="0" y="8" width="60" height="12" rx="3" fill="#8b949e"/>
      <!-- Wrench head -->
      <path d="M 55 0 L 75 0 L 75 10 L 65 10 L 65 18 L 75 18 L 75 28 L 55 28 Z" fill="#8b949e"/>
      <!-- Wrench shine -->
      <rect x="5" y="11" width="45" height="3" rx="1" fill="#adbac7" opacity="0.5"/>
    </g>
  </g>

  <!-- Text -->
  <text x="240" y="95" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff">
    Contributing to <tspan fill="url(#pythonYellow)">Mailview</tspan>
  </text>

  <!-- Tagline -->
  <text x="240" y="135" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#8b949e">
    Thanks for helping make email testing better for everyone
  </text>
</svg>
