name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: pytest --cov=mailview --cov-report=xml --benchmark-skip

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  # Test compatibility with different Starlette/FastAPI versions
  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported versions (must be compatible pairs)
          - name: "min"
            starlette: "0.40.0"
            fastapi: "0.115.5"
          # Mid-range versions
          - name: "mid"
            starlette: "0.46.0"
            fastapi: "0.115.12"
          # Latest versions (empty = use latest from pip)
          - name: "latest"
            starlette: ""
            fastapi: ""

    name: compat (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pinned versions first
        if: matrix.starlette != '' && matrix.fastapi != ''
        run: |
          python -m pip install --upgrade pip
          pip install "starlette==${{ matrix.starlette }}" "fastapi==${{ matrix.fastapi }}"
          pip install -e ".[dev]"

      - name: Install latest versions
        if: matrix.starlette == '' && matrix.fastapi == ''
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show installed versions
        run: |
          pip show starlette | grep Version
          pip show fastapi | grep Version

      - name: Run tests
        run: pytest --benchmark-skip -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run security scan
        run: bandit -r mailview -ll
