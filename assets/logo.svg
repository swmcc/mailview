<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <!-- Gradient for envelope -->
    <linearGradient id="envGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B8BBE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#306998;stop-opacity:1" />
    </linearGradient>

    <!-- Python yellow gradient -->
    <linearGradient id="pythonYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE873;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD43B;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>

    <!-- Inner shadow for envelope -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#1a1a2e" flood-opacity="0.2" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#0d1117" rx="12"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2430" stroke-width="1"/>
  </pattern>
  <rect width="800" height="300" fill="url(#grid)" opacity="0.5" rx="12"/>

  <!-- Envelope body -->
  <g filter="url(#shadow)" transform="translate(80, 60)">
    <!-- Main envelope rectangle -->
    <rect x="0" y="40" width="200" height="140" rx="8" fill="url(#envGradient)" filter="url(#innerShadow)"/>

    <!-- Envelope flap (open) -->
    <path d="M 0 48 L 100 -10 L 200 48 L 200 40 C 200 35 196 32 192 32 L 8 32 C 4 32 0 35 0 40 Z"
          fill="url(#pythonYellow)"
          transform="rotate(-15, 100, 40) translate(0, -20)"/>

    <!-- Inner envelope flap shadow -->
    <path d="M 8 48 L 100 100 L 192 48"
          fill="none"
          stroke="#2d5986"
          stroke-width="2"
          opacity="0.5"/>

    <!-- Envelope fold lines -->
    <path d="M 0 48 L 100 110 L 200 48"
          fill="none"
          stroke="#FFD43B"
          stroke-width="3"
          stroke-linecap="round"/>
  </g>

  <!-- Python snake coming out of envelope -->
  <g transform="translate(80, 60)">
    <!-- Snake body -->
    <path d="M 100 80
             C 100 50, 140 30, 160 50
             C 180 70, 170 90, 150 85
             C 130 80, 140 60, 155 65"
          fill="none"
          stroke="url(#pythonYellow)"
          stroke-width="16"
          stroke-linecap="round"/>

    <!-- Snake head -->
    <ellipse cx="158" cy="62" rx="14" ry="10" fill="#FFD43B"/>

    <!-- Snake eye -->
    <circle cx="164" cy="59" r="3" fill="#306998"/>

    <!-- Snake tongue -->
    <path d="M 172 62 L 182 58 M 172 62 L 182 66"
          stroke="#e74c3c"
          stroke-width="2"
          stroke-linecap="round"/>
  </g>

  <!-- Email lines (representing content) -->
  <g transform="translate(80, 60)" opacity="0.6">
    <rect x="30" y="100" width="140" height="8" rx="4" fill="#fff"/>
    <rect x="30" y="120" width="100" height="8" rx="4" fill="#fff"/>
    <rect x="30" y="140" width="120" height="8" rx="4" fill="#fff"/>
  </g>

  <!-- Text: mailview -->
  <text x="320" y="165" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#ffffff">
    mail<tspan fill="url(#pythonYellow)">view</tspan>
  </text>

  <!-- Tagline -->
  <text x="320" y="210" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#8b949e">
    Zero-config email interceptor for Python ASGI
  </text>

  <!-- Python + ASGI badges -->
  <g transform="translate(320, 230)">
    <rect x="0" y="0" width="90" height="28" rx="14" fill="#306998"/>
    <text x="45" y="19" font-family="system-ui, sans-serif" font-size="13" fill="#FFD43B" text-anchor="middle" font-weight="600">Python 3.11+</text>

    <rect x="100" y="0" width="65" height="28" rx="14" fill="#2d333b"/>
    <text x="132" y="19" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle" font-weight="600">ASGI</text>

    <rect x="175" y="0" width="85" height="28" rx="14" fill="#2d333b"/>
    <text x="217" y="19" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle" font-weight="600">Zero Config</text>
  </g>
</svg>
