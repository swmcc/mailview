<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailview - Dev Email Inbox</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-orange: #d29922;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 24px;
        }

        .badge {
            background: var(--accent-blue);
            color: var(--bg-primary);
            font-size: 12px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn:hover {
            background: var(--border-color);
            border-color: var(--text-muted);
        }

        .btn-danger {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .btn-danger:hover {
            background: var(--accent-red);
            color: white;
        }

        .btn-primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .btn-primary:hover {
            background: #4393e6;
            border-color: #4393e6;
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        /* Main container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Email list */
        .email-list {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .email-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .email-item:last-child {
            border-bottom: none;
        }

        .email-item:hover {
            background: var(--bg-tertiary);
        }

        .email-item.selected {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent-blue);
            padding-left: 17px;
        }

        .email-content {
            min-width: 0;
        }

        .email-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .email-sender {
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-badges {
            display: flex;
            gap: 4px;
        }

        .email-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        .email-badge.html {
            background: rgba(88, 166, 255, 0.2);
            color: var(--accent-blue);
        }

        .email-badge.text {
            background: rgba(63, 185, 80, 0.2);
            color: var(--accent-green);
        }

        .email-badge.attachments {
            background: rgba(210, 153, 34, 0.2);
            color: var(--accent-orange);
        }

        .email-subject {
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .email-recipients {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }

        .email-time {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .email-delete {
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .email-item:hover .email-delete {
            opacity: 1;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Detail panel */
        .detail-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 60%;
            max-width: 800px;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            transform: translateX(100%);
            transition: transform 0.2s ease;
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        .detail-panel.open {
            transform: translateX(0);
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-tertiary);
        }

        .detail-title {
            flex: 1;
            min-width: 0;
        }

        .detail-subject {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            word-wrap: break-word;
        }

        .detail-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .detail-meta-row {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }

        .detail-meta-label {
            color: var(--text-muted);
            min-width: 60px;
        }

        .detail-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }

        .detail-close:hover {
            color: var(--text-primary);
        }

        /* Tabs */
        .detail-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .detail-tab {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s ease;
        }

        .detail-tab:hover {
            color: var(--text-primary);
        }

        .detail-tab.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        .detail-body {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }

        .detail-body.html-view {
            padding: 0;
        }

        .detail-body iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .detail-body pre {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Attachments */
        .attachments-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .attachment-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            text-decoration: none;
            color: var(--text-primary);
            transition: background 0.15s ease;
        }

        .attachment-item:hover {
            background: var(--border-color);
        }

        .attachment-icon {
            font-size: 20px;
        }

        .attachment-info {
            flex: 1;
        }

        .attachment-name {
            font-weight: 500;
        }

        .attachment-size {
            font-size: 12px;
            color: var(--text-muted);
        }

        .attachment-preview {
            width: 100%;
            max-width: 300px;
            margin-top: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .attachment-item.with-preview {
            flex-direction: column;
            align-items: flex-start;
        }

        .attachment-item.with-preview .attachment-header {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        /* Headers table */
        .headers-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .headers-table th,
        .headers-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .headers-table th {
            color: var(--text-muted);
            font-weight: 500;
            width: 120px;
            vertical-align: top;
        }

        .headers-table td {
            color: var(--text-primary);
            word-break: break-word;
        }

        /* Copy button */
        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            font-size: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
            z-index: 10;
        }

        .copy-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .copy-btn.copied {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: white;
        }

        .detail-body {
            position: relative;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 150;
        }

        .overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.2s ease;
            z-index: 300;
        }

        .toast.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--accent-green);
        }

        .toast.error {
            border-color: var(--accent-red);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }

            .container {
                padding: 16px;
            }

            .detail-panel {
                width: 100%;
            }

            .email-item {
                grid-template-columns: 1fr;
            }

            .email-meta {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }

            .email-delete {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">📬</span>
                <span>Mailview</span>
            </div>
            <span class="badge" id="emailCount">0</span>
        </div>
        <div class="header-actions">
            <button class="btn" id="autoRefreshBtn" onclick="toggleAutoRefresh()" title="Auto-refresh enabled (click to disable)">
                ⏸️ Auto
            </button>
            <button class="btn" onclick="refreshEmails()" title="Refresh">
                🔄 Refresh
            </button>
            <button class="btn btn-danger" onclick="clearAllEmails()" id="clearAllBtn" disabled>
                🗑️ Clear All
            </button>
        </div>
    </header>

    <main class="container">
        <div class="email-list" id="emailList">
            <div class="loading">
                <div class="spinner"></div>
                Loading emails...
            </div>
        </div>
    </main>

    <div class="overlay" id="overlay" onclick="closeDetail()"></div>

    <aside class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <div class="detail-title">
                <div class="detail-subject" id="detailSubject"></div>
                <div class="detail-meta">
                    <div class="detail-meta-row">
                        <span class="detail-meta-label">From:</span>
                        <span id="detailFrom"></span>
                    </div>
                    <div class="detail-meta-row">
                        <span class="detail-meta-label">To:</span>
                        <span id="detailTo"></span>
                    </div>
                    <div class="detail-meta-row" id="detailCcRow" style="display: none;">
                        <span class="detail-meta-label">Cc:</span>
                        <span id="detailCc"></span>
                    </div>
                    <div class="detail-meta-row">
                        <span class="detail-meta-label">Date:</span>
                        <span id="detailDate"></span>
                    </div>
                </div>
            </div>
            <button class="detail-close" onclick="closeDetail()">&times;</button>
        </div>
        <div class="detail-tabs" id="detailTabs">
            <!-- Tabs populated dynamically -->
        </div>
        <div class="detail-body" id="detailBody">
            <!-- Content populated dynamically -->
        </div>
    </aside>

    <div class="toast" id="toast"></div>

    <script>
        // State
        let emails = [];
        let selectedEmail = null;
        let currentTab = 'html';
        let autoRefreshEnabled = true;
        let autoRefreshInterval = null;

        // Derive API base: use current path without trailing slash
        // This correctly handles mount paths like /_mail or /admin/_mail
        const API_BASE = window.location.pathname.replace(/\/$/, '') || '/_mail';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            refreshEmails();
            startAutoRefresh();
        });

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            if (autoRefreshEnabled) {
                autoRefreshInterval = setInterval(refreshEmails, 30000);
            }
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            const btn = document.getElementById('autoRefreshBtn');
            btn.textContent = autoRefreshEnabled ? '⏸️ Auto' : '▶️ Auto';
            btn.title = autoRefreshEnabled ? 'Auto-refresh enabled (click to disable)' : 'Auto-refresh disabled (click to enable)';
            startAutoRefresh();
        }

        // Fetch emails
        async function refreshEmails() {
            try {
                const response = await fetch(`${API_BASE}/api/emails`);
                if (!response.ok) throw new Error('Failed to fetch emails');
                const data = await response.json();
                emails = data.emails || [];
                renderEmailList();
                updateCount();
            } catch (error) {
                console.error('Error fetching emails:', error);
                showToast('Failed to load emails', 'error');
            }
        }

        // Render email list
        function renderEmailList() {
            const list = document.getElementById('emailList');

            if (emails.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h2>No emails yet</h2>
                        <p>Captured emails will appear here</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = emails.map(email => `
                <div class="email-item ${selectedEmail?.id === email.id ? 'selected' : ''}"
                     onclick="selectEmail('${email.id}')">
                    <div class="email-content">
                        <div class="email-header">
                            <span class="email-sender">${escapeHtml(email.sender || 'Unknown')}</span>
                            <div class="email-badges">
                                ${email.has_html ? '<span class="email-badge html">HTML</span>' : ''}
                                ${email.has_text ? '<span class="email-badge text">Text</span>' : ''}
                                ${email.attachment_count > 0 ? `<span class="email-badge attachments">📎 ${email.attachment_count}</span>` : ''}
                            </div>
                        </div>
                        <div class="email-subject">${escapeHtml(email.subject || '(No subject)')}</div>
                        <div class="email-recipients">To: ${escapeHtml(formatRecipients(email.to))}</div>
                    </div>
                    <div class="email-meta">
                        <span class="email-time">${formatTime(email.created_at)}</span>
                        <button class="btn btn-sm btn-danger email-delete"
                                onclick="event.stopPropagation(); deleteEmail('${email.id}')">
                            Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Select email
        async function selectEmail(id) {
            try {
                const response = await fetch(`${API_BASE}/api/emails/${id}`);
                if (!response.ok) throw new Error('Failed to fetch email');
                const data = await response.json();
                selectedEmail = data.email;
                renderDetail();
                openDetail();
                renderEmailList(); // Update selection state
            } catch (error) {
                console.error('Error fetching email:', error);
                showToast('Failed to load email', 'error');
            }
        }

        // Render detail panel
        function renderDetail() {
            if (!selectedEmail) return;

            document.getElementById('detailSubject').textContent = selectedEmail.subject || '(No subject)';
            document.getElementById('detailFrom').textContent = selectedEmail.sender || 'Unknown';
            document.getElementById('detailTo').textContent = formatRecipients(selectedEmail.to);
            document.getElementById('detailDate').textContent = formatDateTime(selectedEmail.created_at);

            // Handle CC
            const ccRow = document.getElementById('detailCcRow');
            if (selectedEmail.cc && selectedEmail.cc.length > 0) {
                ccRow.style.display = 'flex';
                document.getElementById('detailCc').textContent = formatRecipients(selectedEmail.cc);
            } else {
                ccRow.style.display = 'none';
            }

            // Render tabs
            renderTabs();
            renderTabContent();
        }

        // Render tabs
        function renderTabs() {
            const tabs = document.getElementById('detailTabs');
            const availableTabs = [];

            if (selectedEmail.has_html || selectedEmail.html_body) {
                availableTabs.push({ id: 'html', label: 'HTML' });
            }
            if (selectedEmail.has_text || selectedEmail.text_body) {
                availableTabs.push({ id: 'text', label: 'Text' });
            }
            if (selectedEmail.attachments && selectedEmail.attachments.length > 0) {
                availableTabs.push({ id: 'attachments', label: `Attachments (${selectedEmail.attachments.length})` });
            }
            availableTabs.push({ id: 'source', label: 'Source' });
            availableTabs.push({ id: 'headers', label: 'Headers' });

            // Set default tab
            if (!availableTabs.find(t => t.id === currentTab)) {
                currentTab = availableTabs[0]?.id || 'html';
            }

            tabs.innerHTML = availableTabs.map(tab => `
                <button class="detail-tab ${tab.id === currentTab ? 'active' : ''}"
                        onclick="switchTab('${tab.id}')">
                    ${tab.label}
                </button>
            `).join('');
        }

        // Switch tab
        function switchTab(tabId) {
            currentTab = tabId;
            renderTabs();
            renderTabContent();
        }

        // Render tab content
        function renderTabContent() {
            const body = document.getElementById('detailBody');

            switch (currentTab) {
                case 'html':
                    body.className = 'detail-body html-view';
                    // Sandbox iframe to prevent script execution and isolate email content
                    body.innerHTML = `<iframe src="${API_BASE}/api/emails/${selectedEmail.id}/html" sandbox="allow-same-origin" referrerpolicy="no-referrer"></iframe>`;
                    break;
                case 'text':
                    body.className = 'detail-body';
                    body.innerHTML = `
                        <button class="copy-btn" onclick="copyToClipboard(this, 'text')">📋 Copy</button>
                        <pre>${escapeHtml(selectedEmail.text_body || 'No text content')}</pre>
                    `;
                    break;
                case 'attachments':
                    body.className = 'detail-body';
                    body.innerHTML = renderAttachments();
                    break;
                case 'source':
                    body.className = 'detail-body';
                    body.innerHTML = `
                        <button class="copy-btn" onclick="copyToClipboard(this, 'source')">📋 Copy</button>
                        <pre>${escapeHtml(formatSource(selectedEmail))}</pre>
                    `;
                    break;
                case 'headers':
                    body.className = 'detail-body';
                    body.innerHTML = `
                        <button class="copy-btn" onclick="copyToClipboard(this, 'headers')">📋 Copy</button>
                        ${renderHeadersTable(selectedEmail)}
                    `;
                    break;
            }
        }

        // Max size for image preview (5MB) - larger images just show download link
        const MAX_PREVIEW_SIZE = 5 * 1024 * 1024;

        // Check if content type is a previewable raster image
        function isPreviewableImage(contentType, size) {
            if (!contentType) return false;
            if (size > MAX_PREVIEW_SIZE) return false;

            // Normalize MIME type: strip parameters and lowercase
            const baseType = contentType.split(';', 1)[0].trim().toLowerCase();

            // Allowlist common raster image types; exclude SVG and other vector/complex formats
            const allowedImageTypes = [
                'image/jpeg',
                'image/jpg',
                'image/png',
                'image/gif',
                'image/webp',
                'image/bmp'
            ];

            return allowedImageTypes.includes(baseType);
        }

        // Render attachments using DOM APIs to prevent XSS via malicious filenames
        function renderAttachments() {
            if (!selectedEmail.attachments || selectedEmail.attachments.length === 0) {
                return '<p>No attachments</p>';
            }

            const container = document.createElement('div');
            container.className = 'attachments-list';

            selectedEmail.attachments.forEach(att => {
                const canPreview = isPreviewableImage(att.content_type, att.size);
                const isImage = att.content_type?.startsWith('image/');
                const attachmentUrl = `${API_BASE}/api/emails/${selectedEmail.id}/attachments/${encodeURIComponent(att.filename)}`;

                const link = document.createElement('a');
                link.className = canPreview ? 'attachment-item with-preview' : 'attachment-item';
                link.href = attachmentUrl;
                link.download = att.filename;  // Set via DOM property, not attribute string

                // Create header section (icon + info)
                const header = document.createElement('div');
                header.className = 'attachment-header';

                const icon = document.createElement('span');
                icon.className = 'attachment-icon';
                icon.textContent = isImage ? '🖼️' : '📄';

                const info = document.createElement('div');
                info.className = 'attachment-info';

                const name = document.createElement('div');
                name.className = 'attachment-name';
                name.textContent = att.filename;

                const size = document.createElement('div');
                size.className = 'attachment-size';
                size.textContent = `${formatSize(att.size)} · ${att.content_type}`;

                info.appendChild(name);
                info.appendChild(size);
                header.appendChild(icon);
                header.appendChild(info);
                link.appendChild(header);

                // Add image preview for safe, reasonably-sized images
                if (canPreview) {
                    const preview = document.createElement('img');
                    preview.className = 'attachment-preview';
                    // Use inline disposition for preview rendering
                    preview.src = `${attachmentUrl}?inline=1`;
                    preview.alt = att.filename;
                    preview.loading = 'lazy';
                    preview.referrerPolicy = 'no-referrer';
                    // Handle failed image loads gracefully
                    preview.onerror = () => {
                        preview.style.display = 'none';
                        link.classList.remove('with-preview');
                    };
                    link.appendChild(preview);
                }

                container.appendChild(link);
            });

            return container.outerHTML;
        }

        // Get header value case-insensitively
        function getHeader(email, name) {
            if (!email.headers || typeof email.headers !== 'object') return null;
            const lowerName = name.toLowerCase();
            const key = Object.keys(email.headers).find(k => k.toLowerCase() === lowerName);
            return key ? email.headers[key] : null;
        }

        // Format raw source (headers + body)
        function formatSource(email) {
            const messageId = getHeader(email, 'message-id') || email.id;
            const date = getHeader(email, 'date') || email.created_at;
            const replyTo = getHeader(email, 'reply-to');

            const lines = [
                `Message-ID: ${messageId}`,
                `Date: ${date}`,
                `From: ${email.sender || ''}`,
                `To: ${formatRecipients(email.to)}`,
            ];
            if (email.cc && email.cc.length) {
                lines.push(`Cc: ${formatRecipients(email.cc)}`);
            }
            if (email.bcc && email.bcc.length) {
                lines.push(`Bcc: ${formatRecipients(email.bcc)}`);
            }
            if (replyTo) {
                lines.push(`Reply-To: ${replyTo}`);
            }
            lines.push(`Subject: ${email.subject || ''}`);

            // Determine content type based on what's actually present
            const hasHtml = email.has_html || email.html_body;
            const hasText = email.has_text || email.text_body;
            if (hasHtml && hasText) {
                lines.push(`Content-Type: multipart/alternative`);
            } else if (hasHtml) {
                lines.push(`Content-Type: text/html; charset=utf-8`);
            } else if (hasText) {
                lines.push(`Content-Type: text/plain; charset=utf-8`);
            }

            lines.push('');
            if (email.text_body) {
                lines.push(email.text_body);
            }
            if (email.html_body) {
                lines.push('');
                lines.push('---------- HTML Body ----------');
                lines.push(email.html_body);
            }
            return lines.join('\n');
        }

        // Render headers as a table
        function renderHeadersTable(email) {
            const messageId = getHeader(email, 'message-id');
            const replyTo = getHeader(email, 'reply-to');

            const rows = [];

            // Show actual Message-ID if available, otherwise internal ID
            if (messageId) {
                rows.push({ label: 'Message-ID', value: messageId });
            }
            rows.push({ label: 'Mailview ID', value: email.id });
            rows.push({ label: 'Date', value: formatDateTime(email.created_at) });
            rows.push({ label: 'From', value: email.sender || '(none)' });
            rows.push({ label: 'To', value: formatRecipients(email.to) || '(none)' });

            if (email.cc && email.cc.length) {
                rows.push({ label: 'Cc', value: formatRecipients(email.cc) });
            }
            if (email.bcc && email.bcc.length) {
                rows.push({ label: 'Bcc', value: formatRecipients(email.bcc) });
            }
            if (replyTo) {
                rows.push({ label: 'Reply-To', value: replyTo });
            }
            rows.push({ label: 'Subject', value: email.subject || '(none)' });
            rows.push({ label: 'Has HTML', value: email.has_html ? 'Yes' : 'No' });
            rows.push({ label: 'Has Text', value: email.has_text ? 'Yes' : 'No' });
            if (email.attachments && email.attachments.length > 0) {
                rows.push({
                    label: 'Attachments',
                    value: email.attachments.map(a => a.filename).join(', ')
                });
            }

            return `
                <table class="headers-table">
                    <tbody>
                        ${rows.map(row => `
                            <tr>
                                <th>${escapeHtml(row.label)}</th>
                                <td>${escapeHtml(row.value)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // Copy to clipboard
        async function copyToClipboard(btn, type) {
            let content = '';
            switch (type) {
                case 'text':
                    content = selectedEmail.text_body || '';
                    break;
                case 'source':
                    content = formatSource(selectedEmail);
                    break;
                case 'headers':
                    content = formatHeadersText(selectedEmail);
                    break;
            }

            try {
                await navigator.clipboard.writeText(content);
                btn.textContent = '✓ Copied';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copy';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                showToast('Failed to copy to clipboard', 'error');
            }
        }

        // Format headers as plain text for copying
        function formatHeadersText(email) {
            const messageId = getHeader(email, 'message-id');
            const replyTo = getHeader(email, 'reply-to');

            const lines = [];
            if (messageId) {
                lines.push(`Message-ID: ${messageId}`);
            }
            lines.push(`Mailview ID: ${email.id}`);
            lines.push(`Date: ${formatDateTime(email.created_at)}`);
            lines.push(`From: ${email.sender || '(none)'}`);
            lines.push(`To: ${formatRecipients(email.to) || '(none)'}`);

            if (email.cc && email.cc.length) {
                lines.push(`Cc: ${formatRecipients(email.cc)}`);
            }
            if (email.bcc && email.bcc.length) {
                lines.push(`Bcc: ${formatRecipients(email.bcc)}`);
            }
            if (replyTo) {
                lines.push(`Reply-To: ${replyTo}`);
            }
            lines.push(`Subject: ${email.subject || '(none)'}`);
            lines.push(`Has HTML: ${email.has_html ? 'Yes' : 'No'}`);
            lines.push(`Has Text: ${email.has_text ? 'Yes' : 'No'}`);
            if (email.attachments && email.attachments.length > 0) {
                lines.push(`Attachments: ${email.attachments.map(a => a.filename).join(', ')}`);
            }
            return lines.join('\n');
        }

        // Open/close detail panel
        function openDetail() {
            document.getElementById('detailPanel').classList.add('open');
            document.getElementById('overlay').classList.add('visible');
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('visible');
            document.body.style.overflow = '';
            selectedEmail = null;
            renderEmailList();
        }

        // Delete email
        async function deleteEmail(id) {
            if (!confirm('Delete this email?')) return;

            try {
                const response = await fetch(`${API_BASE}/api/emails/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Failed to delete email');

                if (selectedEmail?.id === id) {
                    closeDetail();
                }

                await refreshEmails();
                showToast('Email deleted', 'success');
            } catch (error) {
                console.error('Error deleting email:', error);
                showToast('Failed to delete email', 'error');
            }
        }

        // Clear all emails
        async function clearAllEmails() {
            if (!confirm('Delete all captured emails?')) return;

            try {
                const response = await fetch(`${API_BASE}/api/emails`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Failed to clear emails');

                closeDetail();
                await refreshEmails();
                showToast('All emails cleared', 'success');
            } catch (error) {
                console.error('Error clearing emails:', error);
                showToast('Failed to clear emails', 'error');
            }
        }

        // Update count badge
        function updateCount() {
            document.getElementById('emailCount').textContent = emails.length;
            document.getElementById('clearAllBtn').disabled = emails.length === 0;
        }

        // Utility functions
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatRecipients(recipients) {
            if (!recipients) return '';
            if (Array.isArray(recipients)) return recipients.join(', ');
            return recipients;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
            if (date.toDateString() === now.toDateString()) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }

        function formatDateTime(timestamp) {
            if (!timestamp) return '';
            return new Date(timestamp).toLocaleString();
        }

        function formatSize(bytes) {
            if (!bytes) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB'];
            let i = 0;
            while (bytes >= 1024 && i < units.length - 1) {
                bytes /= 1024;
                i++;
            }
            return `${bytes.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
        }

        // Toast notifications
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} visible`;
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 3000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeDetail();
            }
        });
    </script>
</body>
</html>
